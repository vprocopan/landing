<section class="contact" id="contact" aria-labelledby="contact-heading">
  <div class="container contact__container">

    <div class="section-header reveal">
      <p class="section-label">Get in touch</p>
      <h2 class="section-title" id="contact-heading">
        Ready to build<br/><span class="gradient-text">something great?</span>
      </h2>
      <p class="section-sub">
        Tell us about your project and we'll get back to you within 24 hours.
      </p>
    </div>

    <div class="contact__body">

      <form
        class="contact__form reveal reveal--delay-1"
        id="contactForm"
        action="https://formspree.io/f/hello@intercode.company"
        method="POST"
        novalidate
        aria-label="Contact form"
      >
        <div class="form__row">
          <div class="form__group">
            <label for="contactName" class="form__label">Name</label>
            <input
              type="text"
              id="contactName"
              name="name"
              class="form__input"
              placeholder="Jane Smith"
              required
              autocomplete="name"
            />
          </div>
          <div class="form__group">
            <label for="contactEmail" class="form__label">Email</label>
            <input
              type="email"
              id="contactEmail"
              name="email"
              class="form__input"
              placeholder="jane@company.com"
              required
              autocomplete="email"
            />
          </div>
        </div>

        <div class="form__group">
          <label for="contactSubject" class="form__label">What are you building?</label>
          <select id="contactSubject" name="subject" class="form__input form__select">
            <option value="" disabled selected>Select a service…</option>
            <option value="web">Web Development</option>
            <option value="mobile">Mobile App</option>
            <option value="cloud">Cloud &amp; DevOps</option>
            <option value="ai">AI / Machine Learning</option>
            <option value="backend">Backend &amp; APIs</option>
            <option value="consulting">Technical Consulting</option>
            <option value="other">Something else</option>
          </select>
        </div>

        <div class="form__group">
          <label for="contactMessage" class="form__label">Message</label>
          <textarea
            id="contactMessage"
            name="message"
            class="form__input form__textarea"
            rows="5"
            placeholder="Tell us about your project, timeline, and budget…"
            required
          ></textarea>
        </div>

        <button type="submit" class="btn btn--primary btn--full" id="contactSubmit">
          Send Message
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"/></svg>
        </button>

        <p class="contact__note" id="contactFeedback" aria-live="polite"></p>
      </form>

      <aside class="contact__aside reveal reveal--delay-2" aria-label="Contact details">
        <div class="contact__detail">
          <div class="contact__detail-icon" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/></svg>
          </div>
          <div>
            <p class="contact__detail-label">Email us</p>
            <a href="mailto:hello@intercode.company" class="contact__detail-value">hello@intercode.company</a>
          </div>
        </div>

        <div class="contact__detail">
          <div class="contact__detail-icon" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          </div>
          <div>
            <p class="contact__detail-label">Response time</p>
            <p class="contact__detail-value">Within 24 hours</p>
          </div>
        </div>

        <div class="contact__detail">
          <div class="contact__detail-icon" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/></svg>
          </div>
          <div>
            <p class="contact__detail-label">Where we work</p>
            <p class="contact__detail-value">Remote — Worldwide 🌍</p>
          </div>
        </div>

        <div class="contact__socials">
          <a href="https://github.com/intercode-company" class="contact__social" aria-label="GitHub" target="_blank" rel="noopener">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
          </a>
          <a href="https://linkedin.com/company/intercode" class="contact__social" aria-label="LinkedIn" target="_blank" rel="noopener">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
          </a>
        </div>
      </aside>
    </div>

  </div>
</section>

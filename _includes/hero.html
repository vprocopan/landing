<section class="hero" id="home" aria-label="Hero">
  <!-- Animated background elements -->
  <div class="hero__bg" aria-hidden="true">
    <div class="hero__orb hero__orb--1"></div>
    <div class="hero__orb hero__orb--2"></div>
    <div class="hero__orb hero__orb--3"></div>
    <div class="hero__grid"></div>
  </div>

  <div class="container hero__content">
    <div class="hero__badge reveal">
      <span class="hero__badge-dot"></span>
      Available for new projects
    </div>

    <h1 class="hero__headline reveal reveal--delay-1">
      Software crafted<br/>
      <span class="gradient-text">for the future.</span>
    </h1>

    <p class="hero__sub reveal reveal--delay-2">
      We design and engineer high-performance web, mobile, and AI-powered
      products that scale — from zero to millions of users.
    </p>

    <div class="hero__actions reveal reveal--delay-3">
      <a href="#contact" class="btn btn--primary btn--lg" id="heroCtaPrimary">
        Start a Project
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>
      </a>
      <a href="#services" class="btn btn--ghost btn--lg" id="heroCtaSecondary">
        Our Services
      </a>
    </div>

    <div class="hero__stats reveal reveal--delay-4">
      <div class="hero__stat">
        <span class="hero__stat-number">50<span class="gradient-text">+</span></span>
        <span class="hero__stat-label">Projects Delivered</span>
      </div>
      <div class="hero__stat-divider" aria-hidden="true"></div>
      <div class="hero__stat">
        <span class="hero__stat-number">30<span class="gradient-text">+</span></span>
        <span class="hero__stat-label">Happy Clients</span>
      </div>
      <div class="hero__stat-divider" aria-hidden="true"></div>
      <div class="hero__stat">
        <span class="hero__stat-number">5<span class="gradient-text">+</span></span>
        <span class="hero__stat-label">Years of Craft</span>
      </div>
    </div>
  </div>

  <!-- Scroll indicator -->
  <a href="#services" class="hero__scroll" aria-label="Scroll to services">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
  </a>
</section>
